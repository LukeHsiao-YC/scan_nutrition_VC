<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極速 AI 營養標示輸入 (V2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .is-warning { background-color: #fee2e2; border: 1px solid #ef4444 !important; }
        .is-estimated { background-color: #f5f3ff; color: #7c3aed; font-weight: bold; }
        input:focus { background-color: #fff7ed; outline: 2px solid #fb923c; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div id="app" class="p-4 max-w-[1600px] mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm">
            <div>
                <h1 class="text-2xl font-black text-slate-800">🚀 極速營養標示批次輸入</h1>
                <p class="text-sm text-slate-500">API Key 已啟用 | 支援蔬菜纖維自動換算</p>
            </div>
            <div class="flex gap-4">
                <div class="text-right">
                    <p class="text-xs text-slate-400">進度</p>
                    <p class="font-bold text-blue-600">{{ finishedCount }} / {{ images.length }}</p>
                </div>
                <button @click="exportToSheet" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold shadow-lg transition">
                    一鍵匯入 Google 試算表
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左側：上傳與圖片預覽 -->
            <div class="lg:col-span-3 space-y-4">
                <div class="border-4 border-dashed border-slate-300 rounded-2xl p-6 text-center bg-white hover:border-orange-400 transition cursor-pointer"
                     @click="$refs.fileInput.click()">
                    <input type="file" ref="fileInput" multiple accept="image/*" class="hidden" @change="handleUpload">
                    <span class="text-4xl">📸</span>
                    <p class="mt-2 font-bold text-slate-600">點擊上傳多張照片</p>
                </div>

                <div class="grid grid-cols-2 gap-2 overflow-y-auto max-h-[600px] p-2">
                    <div v-for="(img, idx) in images" :key="idx" 
                         @click="selectedIdx = idx"
                         :class="['relative cursor-pointer rounded-lg border-4 overflow-hidden shadow-sm', selectedIdx === idx ? 'border-orange-500 scale-95' : 'border-white']">
                        <img :src="img.url" class="w-full h-32 object-cover">
                        <div v-if="results[idx]?.status === 'processing'" class="absolute inset-0 bg-black/40 flex items-center justify-center">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側：強大的對照表格 -->
            <div class="lg:col-span-9">
                <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-800 text-white">
                            <tr>
                                <th class="p-3 text-left w-32">品項名稱</th>
                                <th class="p-3 w-16">份數</th>
                                <th class="p-3 w-20">淨重(g)</th>
                                <th class="p-3 w-20 text-orange-300">熱量</th>
                                <th class="p-3 w-16">蛋白</th>
                                <th class="p-3 w-16">脂肪</th>
                                <th class="p-3 w-16">碳水</th>
                                <th class="p-3 w-16 text-blue-300">鈉</th>
                                <th class="p-3 w-32">蔬菜類型 (纖維換算)</th>
                                <th class="p-3 w-16 text-purple-300">纖維</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-200">
                            <tr v-for="(item, idx) in results" :key="idx" 
                                @click="selectedIdx = idx"
                                :class="['hover:bg-orange-50 transition', selectedIdx === idx ? 'bg-orange-100' : '']">
                                <td class="p-1"><input v-model="item.name" class="w-full p-2 bg-transparent border rounded"></td>
                                <td class="p-1"><input v-model.number="item.portions" @input="reCalc(idx)" class="w-full p-2 text-center bg-transparent border rounded"></td>
                                <td class="p-1"><input v-model.number="item.netWeight" @input="reCalc(idx)" class="w-full p-2 text-center bg-transparent border rounded"></td>
                                <td class="p-1"><input v-model.number="item.calories" class="w-full p-2 text-center bg-transparent border rounded font-bold text-orange-600" :class="{'is-warning': item.calError}"></td>
                                <td class="p-1"><input v-model.number="item.protein" class="w-full p-2 text-center bg-transparent border rounded"></td>
                                <td class="p-1"><input v-model.number="item.fat" class="w-full p-2 text-center bg-transparent border rounded"></td>
                                <td class="p-1"><input v-model.number="item.carbs" class="w-full p-2 text-center bg-transparent border rounded"></td>
                                <td class="p-1"><input v-model.number="item.sodium" class="w-full p-2 text-center bg-transparent border rounded text-blue-600"></td>
                                <td class="p-1">
                                    <select v-model="item.vegType" @change="reCalc(idx)" class="w-full p-2 bg-white border rounded text-xs">
                                        <option value="none">非蔬菜/標示已有</option>
                                        <option value="raw">生菜 (2%)</option>
                                        <option value="cooked">熟菜 (3%)</option>
                                    </select>
                                </td>
                                <td class="p-1">
                                    <input v-model.number="item.fiber" class="w-full p-2 text-center bg-transparent border rounded font-bold text-purple-600" :class="{'is-estimated': item.fiberEstimated}">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div v-if="results.length === 0" class="p-20 text-center text-slate-400">
                        目前沒有資料，請上傳照片開始。
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                // 你的 API Key 已直接寫入
                const API_KEY = 'AIzaSyC063KgxLEHg645bX_tz1TXCgS30xI-SS4';
                const images = ref([]);
                const results = ref([]);
                const selectedIdx = ref(null);

                const finishedCount = computed(() => results.value.filter(r => r.status === 'done').length);

                const handleUpload = (e) => {
                    const files = Array.from(e.target.files);
                    files.forEach(file => {
                        const url = URL.createObjectURL(file);
                        const idx = images.value.length;
                        images.value.push({ url, file });
                        results.value.push({ 
                            name: '辨識中...', portions: 1, netWeight: 0, calories: 0, 
                            protein: 0, fat: 0, carbs: 0, sodium: 0, fiber: 0, 
                            status: 'processing', vegType: 'none', fiberEstimated: false 
                        });
                        processImage(file, idx);
                    });
                };

                const processImage = async (file, index) => {
                    const base64 = await toBase64(file);
                    const base64Data = base64.split(',')[1];

                    // 優化過的 Prompt：要求輸出單份數據與份數，方便後續修改
                    const prompt = `你是一個營養標示專家。請辨識圖中資訊：
                    1. name: 品項名稱
                    2. portions: 本包裝含幾份 (若標示為1份就寫1)
                    3. netWeight: 總淨重 (克/g)
                    4. p_cal: 每份熱量, p_pro: 每份蛋白, p_fat: 每份脂肪, p_carb: 每份碳水, p_sod: 每份鈉, p_fib: 每份纖維
                    請將以上資訊整理成 JSON。`;

                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
                            })
                        });

                        const data = await response.json();
                        const rawText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
                        const res = JSON.parse(rawText);

                        // 初始計算總量
                        const p = res.portions || 1;
                        results.value[index] = {
                            name: res.name,
                            portions: p,
                            netWeight: res.netWeight || 0,
                            calories: res.p_cal * p,
                            protein: res.p_pro * p,
                            fat: res.p_fat * p,
                            carbs: res.p_carb * p,
                            sodium: res.p_sod * p,
                            fiber: res.p_fib * p || 0,
                            vegType: 'none',
                            status: 'done',
                            fiberEstimated: false
                        };
                        checkError(index);
                    } catch (err) {
                        results.value[index].name = "辨識失敗，請手動輸入";
                        results.value[index].status = "done";
                    }
                };

                // 手動修改或更動份數後的重新計算邏輯
                const reCalc = (idx) => {
                    const item = results.value[idx];
                    // 蔬菜纖維推估邏輯
                    if (item.vegType === 'raw') {
                        item.fiber = (item.netWeight * 0.02).toFixed(1);
                        item.fiberEstimated = true;
                    } else if (item.vegType === 'cooked') {
                        item.fiber = (item.netWeight * 0.03).toFixed(1);
                        item.fiberEstimated = true;
                    } else {
                        item.fiberEstimated = false;
                    }
                    checkError(idx);
                };

                const checkError = (idx) => {
                    const item = results.value[idx];
                    const calcCal = (item.protein * 4) + (item.carbs * 4) + (item.fat * 9);
                    item.calError = Math.abs(calcCal - item.calories) > (item.calories * 0.15);
                };

                const toBase64 = file => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });

                const exportToSheet = async () => {
                    const scriptUrl = '你的_APPS_SCRIPT_URL'; // 這裡請填入你上一次步驟建立的 Script URL
                    if(!scriptUrl.includes('exec')) return alert('請先設定 Google Apps Script URL');
                    
                    try {
                        await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(results.value) });
                        alert('同步成功！');
                    } catch (e) { alert('同步失敗'); }
                };

                return { images, results, selectedIdx, finishedCount, handleUpload, reCalc, exportToSheet };
            }
        }).mount('#app');
    </script>
</body>
</html>
