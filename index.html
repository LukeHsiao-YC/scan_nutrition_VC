<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營養標示 AI 批次辨識系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .is-calculated { background-color: #f0f9ff; color: #0369a1; font-weight: bold; }
        .is-warning { background-color: #fff1f2; color: #be123c; }
        .is-estimated { background-color: #f5f3ff; color: #6d28d9; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="p-4 md:p-8">
        <!-- Header -->
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">🍎 營養標示批次輸入系統</h1>
                <p class="text-gray-500">拍照、辨識、一鍵同步 Google 試算表</p>
            </div>
            <div class="flex gap-2">
                <input v-model="apiKey" type="password" placeholder="輸入 Gemini API Key" class="border p-2 rounded text-sm w-48">
                <button @click="saveSettings" class="bg-gray-800 text-white px-4 py-2 rounded text-sm">儲存設定</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左側：上傳與預覽 -->
            <div class="lg:col-span-4 space-y-4">
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center bg-white hover:border-blue-500 transition cursor-pointer"
                     @click="$refs.fileInput.click()">
                    <input type="file" ref="fileInput" multiple accept="image/*" class="hidden" @change="handleUpload">
                    <div class="text-4xl mb-2">📸</div>
                    <p class="text-gray-600">點擊或拖放照片到這裡</p>
                    <p class="text-xs text-gray-400 mt-2">支援一次大量上傳 (10+ 張)</p>
                </div>

                <div class="grid grid-cols-3 gap-2 max-h-[500px] overflow-y-auto">
                    <div v-for="(img, idx) in images" :key="idx" 
                         @click="selectedIdx = idx"
                         :class="['relative cursor-pointer rounded-lg border-2 overflow-hidden', selectedIdx === idx ? 'border-blue-500' : 'border-transparent']">
                        <img :src="img.url" class="w-full h-24 object-cover">
                        <div v-if="img.status !== 'pending'" class="absolute bottom-0 right-0 bg-black/50 text-white text-[10px] px-1">
                            {{ img.status }}
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側：編輯表格 -->
            <div class="lg:col-span-8">
                <div class="bg-white rounded-xl shadow-sm border overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-100 text-gray-700 uppercase text-xs">
                            <tr>
                                <th class="p-3">品項</th>
                                <th class="p-3">熱量(大卡)</th>
                                <th class="p-3">蛋白質(g)</th>
                                <th class="p-3">脂肪(g)</th>
                                <th class="p-3">碳水(g)</th>
                                <th class="p-3">鈉(mg)</th>
                                <th class="p-3">纖維(g)</th>
                                <th class="p-3">狀態</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(item, idx) in results" :key="idx" 
                                @click="selectedIdx = idx"
                                :class="['border-b hover:bg-orange-50 cursor-pointer', selectedIdx === idx ? 'bg-orange-50' : '']">
                                <td class="p-2"><input v-model="item.name" class="w-full bg-transparent border-none focus:ring-0"></td>
                                <td class="p-2"><input v-model.number="item.calories" class="w-full bg-transparent border-none focus:ring-0" :class="{'is-warning': item.calError}"></td>
                                <td class="p-2"><input v-model.number="item.protein" class="w-full bg-transparent border-none focus:ring-0"></td>
                                <td class="p-2"><input v-model.number="item.fat" class="w-full bg-transparent border-none focus:ring-0"></td>
                                <td class="p-2"><input v-model.number="item.carbs" class="w-full bg-transparent border-none focus:ring-0"></td>
                                <td class="p-2"><input v-model.number="item.sodium" class="w-full bg-transparent border-none focus:ring-0"></td>
                                <td class="p-2"><input v-model.number="item.fiber" class="w-full bg-transparent border-none focus:ring-0" :class="{'is-estimated': item.fiberEstimated}"></td>
                                <td class="p-2 text-xs">
                                    <span v-if="item.status === 'processing'" class="text-blue-500 animate-pulse">辨識中...</span>
                                    <span v-if="item.status === 'done'" class="text-green-500">✅ 完成</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="mt-4 flex justify-end gap-4">
                    <button @click="exportToSheet" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700">一鍵匯入 Google 試算表</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, watch } = Vue;

        createApp({
            setup() {
                const apiKey = ref(localStorage.getItem('gemini_api_key') || '');
                const images = ref([]);
                const results = ref([]);
                const selectedIdx = ref(null);

                const saveSettings = () => {
                    localStorage.setItem('gemini_api_key', apiKey.value);
                    alert('設定已儲存');
                };

                const handleUpload = async (e) => {
                    const files = Array.from(e.target.files);
                    files.forEach(file => {
                        const url = URL.createObjectURL(file);
                        const newIdx = images.value.length;
                        images.value.push({ url, file, status: 'pending' });
                        results.value.push({ name: '讀取中...', calories: 0, protein: 0, fat: 0, carbs: 0, sodium: 0, fiber: 0, status: 'processing', fiberEstimated: false, calError: false });
                        
                        processImage(file, newIdx);
                    });
                };

                const processImage = async (file, index) => {
                    if (!apiKey.value) return alert('請先輸入 API Key');
                    
                    // 將圖片轉為 base64
                    const base64 = await toBase64(file);
                    const base64Data = base64.split(',')[1];

                    const prompt = "你是一個營養學專家。請辨識圖中的營養標示，並找出：1.品項名稱 2.本包裝含幾份 3.每份的熱量、蛋白質、脂肪、碳水、鈉、纖維。請將「每份數值」乘以「份數」得到總量。如果沒有標示纖維且看起來像蔬菜，請根據重量推估纖維。請僅回傳 JSON 格式：{name, calories, protein, fat, carbs, sodium, fiber, fiberEstimated(boolean)}";

                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey.value}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
                            })
                        });

                        const data = await response.json();
                        const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
                        const res = JSON.parse(text);

                        // 異常偵測：計算熱量誤差 (P*4 + C*4 + F*9)
                        const calcCal = (res.protein * 4) + (res.carbs * 4) + (res.fat * 9);
                        const calError = Math.abs(calcCal - res.calories) > (res.calories * 0.1);

                        results.value[index] = { ...res, status: 'done', calError };
                        images.value[index].status = 'done';
                    } catch (err) {
                        console.error(err);
                        results.value[index].name = "辨識失敗";
                        results.value[index].status = "error";
                    }
                };

                const toBase64 = file => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });

                const exportToSheet = async () => {
                    // 這裡替換成你的 Google Apps Script 部署網址
                    const scriptUrl = '你的_GOOGLE_APPS_SCRIPT_URL';
                    if(!scriptUrl.includes('exec')) return alert('請先設定 Google Apps Script URL');

                    try {
                        await fetch(scriptUrl, {
                            method: 'POST',
                            body: JSON.stringify(results.value)
                        });
                        alert('同步成功！');
                    } catch (e) {
                        alert('同步失敗，請檢查 Script 設定');
                    }
                };

                return { apiKey, images, results, selectedIdx, handleUpload, saveSettings, exportToSheet };
            }
        }).mount('#app');
    </script>
</body>
</html>
