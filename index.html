<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極速 AI 營養標示輸入 (V3 - 高準確版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .is-warning { background-color: #fee2e2; border: 2px solid #ef4444 !important; }
        .is-estimated { background-color: #f5f3ff; color: #7c3aed; font-weight: bold; border: 2px solid #ddd6fe !important; }
        input { transition: all 0.2s; border: 1px solid #e2e8f0; }
        input:focus { background-color: #fff7ed; border-color: #fb923c; outline: none; box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.2); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div id="app" class="p-4 max-w-[1600px] mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">🍎 AI 營養辨識系統 <span class="text-blue-600 text-lg">V3</span></h1>
                <p class="text-slate-500 font-medium">針對台灣超商標示優化 | 自動計算總量 | 纖維推估</p>
            </div>
            <div class="flex gap-4 mt-4 md:mt-0">
                <div class="bg-slate-100 px-4 py-2 rounded-xl text-center">
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">目前進度</p>
                    <p class="font-black text-xl text-blue-600">{{ finishedCount }} / {{ images.length }}</p>
                </div>
                <button @click="exportToSheet" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-emerald-100 transition-all transform hover:-translate-y-1">
                    一鍵同步至 Google
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左側：上傳區 -->
            <div class="lg:col-span-3 space-y-4">
                <div class="border-4 border-dashed border-slate-200 rounded-3xl p-10 text-center bg-white hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer group"
                     @click="$refs.fileInput.click()">
                    <input type="file" ref="fileInput" multiple accept="image/*" class="hidden" @change="handleUpload">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📸</div>
                    <p class="font-bold text-slate-700">批次上傳照片</p>
                    <p class="text-xs text-slate-400 mt-1">支援拖放多張圖片</p>
                </div>

                <div class="grid grid-cols-2 gap-3 overflow-y-auto max-h-[600px] p-1">
                    <div v-for="(img, idx) in images" :key="idx" 
                         @click="selectedIdx = idx"
                         :class="['relative cursor-pointer rounded-2xl border-4 overflow-hidden shadow-sm transition-all', selectedIdx === idx ? 'border-blue-500 scale-95 ring-4 ring-blue-100' : 'border-white']">
                        <img :src="img.url" class="w-full h-32 object-cover">
                        <div v-if="results[idx]?.status === 'processing'" class="absolute inset-0 bg-white/80 flex flex-col items-center justify-center">
                            <div class="loading-spinner mb-2"></div>
                            <span class="text-[10px] font-bold text-blue-600 uppercase">辨識中</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側：編輯表格 -->
            <div class="lg:col-span-9">
                <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-slate-900 text-slate-300 text-[11px] uppercase tracking-wider">
                                <th class="p-4 text-left font-bold">品項名稱 (可修改)</th>
                                <th class="p-4 w-20 text-center">份數</th>
                                <th class="p-4 w-24 text-center text-white">總熱量</th>
                                <th class="p-4 w-20 text-center">蛋白質</th>
                                <th class="p-1 w-20 text-center text-white">淨重(g)</th>
                                <th class="p-4 w-20 text-center text-white">脂肪</th>
                                <th class="p-4 w-20 text-center text-white">碳水</th>
                                <th class="p-4 w-20 text-center">鈉</th>
                                <th class="p-4 w-32 text-center">蔬菜推估</th>
                                <th class="p-4 w-20 text-center text-purple-300">纖維</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr v-for="(item, idx) in results" :key="idx" 
                                @click="selectedIdx = idx"
                                :class="['transition-colors', selectedIdx === idx ? 'bg-blue-50/50' : 'hover:bg-slate-50']">
                                <td class="p-2"><input v-model="item.name" class="w-full p-2 bg-white rounded-lg"></td>
                                <td class="p-2 text-center"><input v-model.number="item.portions" @input="reCalc(idx)" class="w-full p-2 text-center bg-white rounded-lg font-bold"></td>
                                <td class="p-2"><input v-model.number="item.calories" class="w-full p-2 text-center bg-white rounded-lg font-black text-orange-600" :class="{'is-warning': item.calError}"></td>
                                <td class="p-2"><input v-model.number="item.protein" @input="reCalc(idx)" class="w-full p-2 text-center bg-white rounded-lg"></td>
                                <td class="p-2"><input v-model.number="item.netWeight" @input="reCalc(idx)" class="w-full p-2 text-center bg-slate-100 rounded-lg font-bold"></td>
                                <td class="p-2"><input v-model.number="item.fat" @input="reCalc(idx)" class="w-full p-2 text-center bg-white rounded-lg"></td>
                                <td class="p-2"><input v-model.number="item.carbs" @input="reCalc(idx)" class="w-full p-2 text-center bg-white rounded-lg"></td>
                                <td class="p-2"><input v-model.number="item.sodium" class="w-full p-2 text-center bg-white rounded-lg text-blue-600"></td>
                                <td class="p-2">
                                    <select v-model="item.vegType" @change="reCalc(idx)" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-600">
                                        <option value="none">標示已有</option>
                                        <option value="raw">生菜(2%)</option>
                                        <option value="cooked">熟菜(3%)</option>
                                    </select>
                                </td>
                                <td class="p-2">
                                    <input v-model.number="item.fiber" class="w-full p-2 text-center bg-white rounded-lg font-black text-purple-600 border-2" :class="{'is-estimated': item.fiberEstimated}">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div v-if="results.length === 0" class="p-24 text-center">
                        <div class="text-6xl mb-4 opacity-20">📊</div>
                        <p class="text-slate-400 font-medium text-lg">上傳營養標示照片後，數據將在此自動呈現</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const API_KEY = 'AIzaSyC063KgxLEHg645bX_tz1TXCgS30xI-SS4';
                const images = ref([]);
                const results = ref([]);
                const selectedIdx = ref(null);

                const finishedCount = computed(() => results.value.filter(r => r.status === 'done').length);

                const handleUpload = (e) => {
                    const files = Array.from(e.target.files);
                    files.forEach(file => {
                        const url = URL.createObjectURL(file);
                        const idx = images.value.length;
                        images.value.push({ url, file });
                        results.value.push({ 
                            name: '讀取中...', portions: 1, netWeight: 0, calories: 0, 
                            protein: 0, fat: 0, carbs: 0, sodium: 0, fiber: 0, 
                            status: 'processing', vegType: 'none', fiberEstimated: false 
                        });
                        processImage(file, idx);
                    });
                };

                const processImage = async (file, index) => {
                    try {
                        const base64 = await toBase64(file);
                        const base64Data = base64.split(',')[1];

                        // 優化過的 Prompt：更嚴格的指令
                        const prompt = `你是營養標示 OCR 專家。請分析這張台灣食品標示圖：
                        1. 尋找「每一份量」的數值。
                        2. 尋找「本包裝含幾份」(portions)。
                        3. 提取品項名稱(name)。
                        4. 提取【每一份量】欄位下的：熱量(p_cal), 蛋白質(p_pro), 脂肪(p_fat), 碳水(p_carb), 鈉(p_sod), 膳食纖維(p_fib)。
                        重要：忽略「每100公克」欄位。
                        請只回傳 JSON 物件，不要任何說明文字：
                        {"name": "...", "portions": 1.0, "netWeight": 100, "p_cal": 0, "p_pro": 0, "p_fat": 0, "p_carb": 0, "p_sod": 0, "p_fib": 0}`;

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
                            })
                        });

                        const data = await response.json();
                        const rawText = data.candidates[0].content.parts[0].text;
                        
                        // 強大的 JSON 提取正則表達式，防止 AI 多廢話
                        const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                        if (!jsonMatch) throw new Error("Format Error");
                        
                        const res = JSON.parse(jsonMatch[0]);

                        // 將「每份」乘以「總份數」
                        const p = parseFloat(res.portions) || 1;
                        results.value[index] = {
                            name: res.name || "未知名稱",
                            portions: p,
                            netWeight: res.netWeight || 0,
                            calories: Math.round(res.p_cal * p),
                            protein: (res.p_pro * p).toFixed(1),
                            fat: (res.p_fat * p).toFixed(1),
                            carbs: (res.p_carb * p).toFixed(1),
                            sodium: Math.round(res.p_sod * p),
                            fiber: (res.p_fib * p) || 0,
                            vegType: 'none',
                            status: 'done',
                            fiberEstimated: false
                        };
                        checkError(index);
                    } catch (err) {
                        console.error(err);
                        results.value[index].name = "辨識失敗，請手動補齊";
                        results.value[index].status = "done";
                    }
                };

                const reCalc = (idx) => {
                    const item = results.value[idx];
                    if (item.vegType === 'raw') {
                        item.fiber = (item.netWeight * 0.02).toFixed(1);
                        item.fiberEstimated = true;
                    } else if (item.vegType === 'cooked') {
                        item.fiber = (item.netWeight * 0.03).toFixed(1);
                        item.fiberEstimated = true;
                    } else {
                        item.fiberEstimated = false;
                    }
                    checkError(idx);
                };

                const checkError = (idx) => {
                    const item = results.value[idx];
                    const calcCal = (item.protein * 4) + (item.carbs * 4) + (item.fat * 9);
                    item.calError = Math.abs(calcCal - item.calories) > (item.calories * 0.15);
                };

                const toBase64 = file => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });

                const exportToSheet = async () => {
                    const scriptUrl = '你的_APPS_SCRIPT_URL';
                    if(!scriptUrl.includes('exec')) return alert('請先設定 Google Apps Script URL (前次對話步驟提到的)');
                    try {
                        const response = await fetch(scriptUrl, { 
                            method: 'POST', 
                            mode: 'no-cors',
                            body: JSON.stringify(results.value) 
                        });
                        alert('同步請求已送出！');
                    } catch (e) { alert('同步失敗'); }
                };

                return { images, results, selectedIdx, finishedCount, handleUpload, reCalc, exportToSheet };
            }
        }).mount('#app');
    </script>
</body>
</html>
